<h2>工作室模块 — 页面结构设计</h2>
<p class="subtitle">三个核心页面：应用列表 → 创建应用 → 应用配置</p>

<div class="section">
  <h3>页面 3：应用配置页（核心）— 已更新</h3>
  <div class="mockup" style="max-width:100%">
    <div class="mockup-header">智能客服助手 · 应用配置</div>
    <div class="mockup-body" style="padding:0;display:flex;min-height:450px">
      <!-- 左侧配置区 -->
      <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto">
        <div>
          <div class="label" style="margin-bottom:6px">选择模型</div>
          <div class="placeholder" style="padding:8px;font-size:12px">下拉选择 LLM 模型（从已配置的 provider 中选）</div>
        </div>
        <div>
          <div class="label" style="margin-bottom:6px">技能配置</div>
          <div class="placeholder" style="padding:8px;font-size:12px">添加/移除技能（System Prompt 模板）</div>
        </div>
        <div>
          <div class="label" style="margin-bottom:6px">提示词 (System Prompt)</div>
          <textarea class="mock-input" placeholder="你是一个智能客服助手，请基于以下知识库回答用户问题..." style="width:100%;height:100px;resize:vertical;font-size:11px;font-family:monospace"></textarea>
        </div>
        <div>
          <div class="label" style="margin-bottom:6px">关联知识库</div>
          <div class="placeholder" style="padding:8px;font-size:12px">选择已创建的知识库作为 RAG 数据源</div>
        </div>
      </div>
      <!-- 右侧预览/测试区 -->
      <div style="width:380px;display:flex;flex-direction:column;border-left:1px solid #eee">
        <div style="padding:10px 16px;border-bottom:1px solid #eee;font-size:12px;font-weight:600;color:#666">预览 & 测试</div>
        <div style="flex:1;padding:16px;display:flex;flex-direction:column;gap:8px">
          <div class="placeholder" style="padding:8px;border-radius:8px;align-self:flex-start;max-width:70%;font-size:11px">你好！我是智能客服助手，有什么可以帮你的？</div>
          <div class="placeholder" style="padding:8px;border-radius:8px;align-self:flex-end;max-width:70%;background:#e8eeff;border-color:#d0d8f0;font-size:11px">请问如何重置密码？</div>
          <div style="margin-top:auto;display:flex;gap:6px">
            <input class="mock-input" placeholder="输入测试消息..." style="flex:1;font-size:11px">
            <button class="mock-button" style="font-size:11px">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <p style="font-size:12px;color:#666;margin-top:6px">左侧从上到下：模型 → 技能 → <strong style="color:#d73a49">提示词 (新增)</strong> → 知识库</p>
</div>
